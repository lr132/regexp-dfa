name: Build WASM & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      # ── Install GHC WASM toolchain ───────────────────────────────────────────
      - name: Install ghc-wasm-meta
        run: |
          curl -sSfL "https://gitlab.haskell.org/haskell-wasm/ghc-wasm-meta/-/raw/master/bootstrap.sh" -o /tmp/bootstrap.sh
          bash /tmp/bootstrap.sh

      - name: Verify wasm32 GHC
        run: |
          source ~/.ghc-wasm/env
          wasm32-wasi-ghc --version
          wasm32-wasi-cabal --version

      # ── Cache cabal store ────────────────────────────────────────────────────
      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            ~/.ghc-wasm/.cabal/store
          key: wasm-cabal-${{ hashFiles('regexp-dfa.cabal') }}
          restore-keys: wasm-cabal-

      # ── Build WASM binary ────────────────────────────────────────────────────
      - name: Build regexp-dfa-web (WASM)
        run: |
          source ~/.ghc-wasm/env
          wasm32-wasi-cabal update
          wasm32-wasi-cabal build exe:regexp-dfa-web

      # ── Post-link: extract JS FFI glue + .wasm ───────────────────────────────
      - name: Post-link and collect artefacts
        run: |
          source ~/.ghc-wasm/env
          WASM_BIN=$(wasm32-wasi-cabal list-bin exe:regexp-dfa-web)
          LIBDIR=$(wasm32-wasi-ghc --print-libdir)
          mkdir -p dist
          # Run post-linker from dist/ so ghc_wasm_jsffi.js lands there
          cd dist
          node "$LIBDIR/post-link.mjs" --input "$WASM_BIN" --output main.wasm
          echo "post-link output size: $(wc -c < main.wasm) bytes"
          # If post-link produced a stub (<100KB), use the raw binary instead
          if [ $(wc -c < main.wasm) -lt 102400 ]; then
            echo "post-link output too small, using raw binary"
            cp "$WASM_BIN" main.wasm
          fi
          cd ..
          cp web/index.html dist/
          cp web/style.css  dist/
          cp web/main.js    dist/
          ls -lh dist/

      # ── Deploy to Cloudflare Pages ───────────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: regconverter
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
