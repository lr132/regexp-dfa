name: Build WASM & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      # ── Install GHC WASM toolchain ───────────────────────────────────────────
      - name: Install ghc-wasm-meta
        run: |
          curl -sSfL "https://gitlab.haskell.org/haskell-wasm/ghc-wasm-meta/-/raw/master/bootstrap.sh" -o /tmp/bootstrap.sh
          bash /tmp/bootstrap.sh

      - name: Verify wasm32 GHC
        run: |
          source ~/.ghc-wasm/env
          wasm32-wasi-ghc --version
          wasm32-wasi-cabal --version

      # ── Cache cabal store ────────────────────────────────────────────────────
      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            ~/.ghc-wasm/.cabal/store
          key: wasm-cabal-${{ hashFiles('regexp-dfa.cabal') }}
          restore-keys: wasm-cabal-

      # ── Build WASM binary ────────────────────────────────────────────────────
      - name: Build regexp-dfa-web (WASM)
        run: |
          source ~/.ghc-wasm/env
          wasm32-wasi-cabal update
          wasm32-wasi-cabal build exe:regexp-dfa-web

      # ── Post-link: extract JS FFI glue + .wasm ───────────────────────────────
      - name: Post-link and collect artefacts
        run: |
          source ~/.ghc-wasm/env
          WASM_BIN=$(wasm32-wasi-cabal list-bin exe:regexp-dfa-web)
          LIBDIR=$(wasm32-wasi-ghc --print-libdir)
          mkdir -p dist
          # post-link.mjs --output produces the JS glue, not the wasm
          node "$LIBDIR/post-link.mjs" --input "$WASM_BIN" --output dist/ghc_wasm_jsffi.js
          # Copy the wasm binary directly
          cp "$WASM_BIN" dist/main.wasm
          cp web/index.html dist/
          cp web/style.css  dist/
          cp web/main.js    dist/
          ls -lh dist/

      # ── Deploy to Cloudflare Pages ───────────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: regconverter
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
